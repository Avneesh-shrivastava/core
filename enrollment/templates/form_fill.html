<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4facfe;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #007bff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Course Enrollment Form</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" name = 'name' required>

        <label>Email ID</label>
        <input type="email" placeholder="Enter your email" name = 'email_id' required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required name="phone_no">

        <label>Address</label>
        <textarea rows="3" placeholder="Enter your address" name="address"></textarea>

        <label>Why do you want to join this course?</label>
        <textarea rows="3" placeholder="Write your reason..." name="reason"></textarea>

        <button type="submit" class="btn">Enroll Now</button>
    </form>
</div>

</body>
</html>
