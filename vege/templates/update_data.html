{% extends "base.html" %}
{% block start %}

<body>

    <div class="container mt-5">
    <form class="col-6 mx-auto card p-3 shadow" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h1>Update Receipe</h1>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label"> Update receipe name</label>
            <input name="updt_name" type="text" class="form-control" >   
        </div>

        <div class="mb-1">
            <label for="exampleInputEmail1" class="form-label" >Update receipe description</label>
            <textarea class="form-control" name="updt_desc" ></textarea> 
        </div>

        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Update image</label>
            <input name="updt_img" type="file" class="form-control">
        </div>


        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    </div>

</body>

{% endblock %}
